[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.tokenizer", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.curl", "php84Extensions.openssl", "php84Extensions.bcmath", "php84Extensions.zip"]
nixLibs = []

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php84 -- --install-dir=/usr/local/bin --filename=composer",
  "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs"
]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache"]

[start]
cmd = "vendor/bin/heroku-php-apache2 public/"
